<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${'Facture #' + order.id}">Facture</title>
    <link rel="stylesheet" th:href="@{/css/store.css}">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<main class="container section">
    <section class="invoice panel">
        <div class="section-head">
            <div>
                <span class="badge prime">Paiement confirme</span>
                <h1 th:text="${'Facture #' + order.id}">Facture</h1>
                <p class="muted" th:text="${#temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm')}">Date</p>
            </div>
            <button class="btn secondary" type="button" onclick="window.print()">Imprimer / PDF</button>
        </div>

        <div class="invoice-meta">
            <div>
                <h3>Client</h3>
                <p th:text="${user.fullName ?: user.username}">Client</p>
                <p class="muted" th:text="${user.email}">email</p>
            </div>
            <div>
                <h3>Paiement</h3>
                <p th:text="${order.paymentMethod}">Carte</p>
                <p class="muted" th:text="${order.transactionId}">TX</p>
            </div>
            <div>
                <h3>Livraison</h3>
                <p th:text="${order.address}">Adresse</p>
            </div>
        </div>

        <table class="invoice-table">
            <thead><tr><th>Produit</th><th>Quantite</th><th>Prix</th><th>Total</th></tr></thead>
            <tbody>
            <tr th:each="item : ${order.items}">
                <td th:text="${item.product.name}">Produit</td>
                <td th:text="${item.quantity}">1</td>
                <td th:text="${item.unitPrice + ' FCFA'}">0</td>
                <td th:text="${item.unitPrice.multiply(T(java.math.BigDecimal).valueOf(item.quantity)) + ' FCFA'}">0</td>
            </tr>
            </tbody>
        </table>

        <div class="invoice-totals">
            <div class="summary-row"><span>Sous-total</span><strong th:text="${order.subtotal + ' FCFA'}">0</strong></div>
            <div class="summary-row"><span>Reduction</span><strong th:text="${order.discount + ' FCFA'}">0</strong></div>
            <div class="summary-row"><span>Taxes</span><strong th:text="${order.tax + ' FCFA'}">0</strong></div>
            <div class="summary-row"><span>Livraison</span><strong th:text="${order.shipping + ' FCFA'}">0</strong></div>
            <div class="summary-row total"><span>Total paye</span><strong th:text="${order.total + ' FCFA'}">0</strong></div>
        </div>

        <div class="hero-actions">
            <a class="btn gold" th:href="@{/products}">Continuer les achats</a>
            <a class="btn secondary" th:href="@{/user/home}">Voir mes commandes</a>
        </div>
    </section>
</main>
<script th:src="@{/js/store.js}"></script>
</body>
</html>
