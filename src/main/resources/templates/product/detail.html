<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${product.name}">Produit</title>
    <link rel="stylesheet" th:href="@{/css/store.css}">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<main class="container">
    <section class="detail">
        <div class="gallery">
            <img class="gallery-main" data-gallery-main th:src="${product.imageUrl}" th:alt="${product.name}">
            <div class="thumbs">
                <img data-gallery-thumb th:each="image : ${product.gallery}" th:src="${image}" th:alt="${product.name}">
            </div>
        </div>
        <div class="panel">
            <span class="badge prime" th:if="${product.primeEligible}">Prime eligible</span>
            <h1 th:text="${product.name}">Produit</h1>
            <p class="muted" th:text="${product.description}">Description</p>
            <div class="rating" th:text="${'★ ' + product.rating + ' / 5 - ' + product.reviewCount + ' avis'}">4.8</div>
            <div><span class="price" th:text="${product.price + ' FCFA'}">99</span><span class="old" th:if="${product.oldPrice}" th:text="${product.oldPrice + ' FCFA'}">120</span></div>
            <p th:text="${'Stock disponible : ' + product.stock}">Stock</p>
            <label>Quantite<input class="input" data-quantity type="number" min="1" value="1"></label>
            <div class="hero-actions">
                <button class="btn gold" sec:authorize="isAuthenticated()" th:data-add-cart="${product.id}">Ajouter au panier</button>
                <form sec:authorize="isAuthenticated()" th:action="@{/wishlist/{id}(id=${product.id})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button class="btn secondary" type="submit">Wishlist</button>
                </form>
                <a class="btn secondary" sec:authorize="!isAuthenticated()" th:href="@{/login}">Se connecter pour acheter</a>
            </div>
            <h3>Caracteristiques</h3>
            <ul>
                <li th:each="spec : ${product.specs}" th:text="${spec}">Spec</li>
            </ul>
        </div>
    </section>

    <section class="section">
        <div class="dashboard">
            <div class="panel">
                <h2>Avis clients</h2>
                <form sec:authorize="isAuthenticated()" th:action="@{/products/{id}/reviews(id=${product.id})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <label>Note<select name="rating"><option>5</option><option>4</option><option>3</option><option>2</option><option>1</option></select></label>
                    <label>Commentaire<textarea name="comment" required rows="3"></textarea></label>
                    <button class="btn" type="submit">Publier</button>
                </form>
                <article th:each="review : ${reviews}" style="border-top:1px solid var(--line);padding:12px 0">
                    <strong th:text="${review.author.username}">user</strong>
                    <span class="rating" th:text="${'★ ' + review.rating}">5</span>
                    <p class="muted" th:text="${review.comment}">Avis</p>
                </article>
            </div>
            <div class="panel">
                <h2>Les clients ont aussi achete</h2>
                <div th:each="item : ${recommendations}" style="display:grid;grid-template-columns:72px 1fr;gap:10px;margin:12px 0">
                    <img th:src="${item.imageUrl}" th:alt="${item.name}" style="width:72px;height:72px;object-fit:cover;border-radius:8px">
                    <a th:href="@{/products/{id}(id=${item.id})}">
                        <strong th:text="${item.name}">Produit</strong>
                        <div class="muted" th:text="${item.price + ' FCFA'}">Prix</div>
                    </a>
                </div>
            </div>
        </div>
    </section>
</main>
<script th:src="@{/js/store.js}"></script>
</body>
</html>
