<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Erreur 500</title>
    <link rel="stylesheet" th:href="@{/css/store.css}">
    <style>
        .error-page {
            min-height: calc(100vh - 200px);
            display: grid;
            place-items: center;
            padding: 40px 20px;
            text-align: center;
        }
        .error-container {
            max-width: 600px;
            padding: 40px;
            background: var(--surface);
            border-radius: 16px;
            border: 1px solid var(--line);
            box-shadow: var(--shadow);
        }
        .error-code {
            font-size: 96px;
            font-weight: 950;
            color: var(--danger);
            margin: 0;
            line-height: 1;
        }
        .error-title {
            font-size: 32px;
            font-weight: 850;
            margin: 16px 0;
            color: var(--ink);
        }
        .error-message {
            color: var(--muted);
            font-size: 16px;
            line-height: 1.6;
            margin: 16px 0 28px;
        }
        .error-details {
            background: var(--surface-2);
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 16px;
            margin: 20px 0;
            text-align: left;
            font-family: monospace;
            font-size: 13px;
            color: var(--muted);
            word-break: break-all;
            max-height: 200px;
            overflow-y: auto;
        }
        .error-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 28px;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
<main class="error-page">
    <div class="error-container">
        <h1 class="error-code" th:text="${status}">500</h1>
        <h2 class="error-title" th:text="${message}">Erreur serveur</h2>
        <p class="error-message">Une erreur interne s'est produite. L'équipe technique a été notifiée. Veuillez réessayer plus tard.</p>
        <div class="error-details" th:if="${error}">
            <strong>Détails:</strong> <br>
            <span th:text="${error}"></span>
        </div>
        <div class="error-details" th:if="${timestamp}">
            <strong>Date/Heure:</strong> <br>
            <span th:text="${timestamp}"></span>
        </div>
        <div class="error-actions">
            <a class="btn" href="/">Accueil</a>
            <a class="btn secondary" href="/support">Support</a>
            <a class="btn secondary" href="javascript:history.back()">Retour</a>
        </div>
    </div>
</main>
<script th:src="@{/js/store.js}"></script>
</body>
</html>
