<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard vendeur</title>
    <link rel="stylesheet" th:href="@{/css/store.css}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<main class="container section">
    <div class="section-head">
        <div><h1>Dashboard vendeur</h1><p class="muted">Ajout, modification, suppression, stock et ventes.</p></div>
    </div>
    <div th:if="${success}" class="panel" th:text="${success}"></div>
    <section class="stats">
        <div class="stat"><span class="muted">Produits</span><strong th:text="${products.size()}">0</strong></div>
        <div class="stat"><span class="muted">Ventes</span><strong th:text="${sales}">0</strong></div>
        <div class="stat"><span class="muted">Stock faible</span><strong th:text="${lowStock}">0</strong></div>
    </section>
    <section class="dashboard section">
        <div class="panel">
            <h2>Produit</h2>
            <form th:action="@{/seller/products}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <label>Nom<input class="input" name="name" required></label>
                <label>Categorie<input class="input" name="category" required></label>
                <label>Prix<input class="input" name="price" type="number" step="0.01" required></label>
                <label>Stock<input class="input" name="stock" type="number" required></label>
                <label>Image URL<input class="input" name="imageUrl" required></label>
                <label>Description<textarea name="description" rows="4" required></textarea></label>
                <button class="btn gold" type="submit">Enregistrer</button>
            </form>
        </div>
        <div class="panel">
            <h2>Ventes</h2>
            <canvas id="sellerChart" height="220"></canvas>
        </div>
    </section>
    <section class="panel">
        <h2>Mes produits</h2>
        <table>
            <tr><th>Produit</th><th>Prix</th><th>Stock</th><th></th></tr>
            <tr th:each="product : ${products}">
                <td th:text="${product.name}">Produit</td>
                <td th:text="${product.price + ' FCFA'}">0</td>
                <td><span class="badge" th:classappend="${product.stock < 8} ? ' low-stock'" th:text="${product.stock}">0</span></td>
                <td>
                    <form th:action="@{/seller/products/{id}/delete(id=${product.id})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button class="btn danger" type="submit">Supprimer</button>
                    </form>
                </td>
            </tr>
        </table>
    </section>
</main>
<script th:inline="javascript">
    new Chart(document.getElementById('sellerChart'), {
        type: 'line',
        data: {labels: ['Lun','Mar','Mer','Jeu','Ven','Sam'], datasets: [{label: 'Ventes', data: [5, 8, 6, 14, 11, [[${sales}]]], borderColor: '#00a8e1', tension: .35}]}
    });
</script>
<script th:src="@{/js/store.js}"></script>
</body>
</html>
