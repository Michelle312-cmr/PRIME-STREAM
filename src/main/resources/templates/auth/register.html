<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" th:replace="~{auth/layout :: page(~{::section})}">
<section>
    <h2 class="form-title">Creer un compte</h2>

    <div th:if="${error}" class="error" th:text="${error}"></div>

    <form th:action="@{/register}" method="post" th:object="${form}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <div class="row">
            <div>
                <label for="username">Nom d'utilisateur</label>
                <input id="username" th:field="*{username}" type="text" placeholder="ex: merveille" required />
                <div class="field-error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
            </div>
            <div>
                <label for="email">Email</label>
                <input id="email" th:field="*{email}" type="email" placeholder="nom@exemple.com" required />
                <div class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
            </div>
        </div>

        <label for="fullName">Nom complet</label>
        <input id="fullName" th:field="*{fullName}" type="text" placeholder="Votre nom complet" required />
        <div class="field-error" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>

        <label for="password">Mot de passe</label>
        <input id="password" th:field="*{password}" type="password" placeholder="Au moins 8 caracteres" required />
        <div class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>

        <button class="btn" type="submit">Inscription</button>

        <div class="links">
            <a th:href="@{/login}">Retour connexion</a>
        </div>
    </form>
</section>
</html>
