<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" th:replace="~{auth/layout :: page(~{::section})}">
<section>
    <h2 class="form-title">Mot de passe oublie</h2>
    <p class="hint">Entrez l'email du compte. Un lien de reinitialisation sera envoye si le compte existe.</p>

    <form th:action="@{/forgot}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <label for="email">Email du compte</label>
        <input id="email" name="email" type="email" placeholder="nom@exemple.com" autocomplete="email" required />

        <button class="btn" type="submit">Envoyer le lien</button>

        <div class="links">
            <a th:href="@{/login}">Retour connexion</a>
            <a th:href="@{/register}">Creer un compte</a>
        </div>
    </form>

    <div th:if="${message}" class="success" th:text="${message}"></div>
    <div th:if="${demoLink}" class="success">
        Mode demo mail: <a th:href="${demoLink}" th:text="${demoLink}"></a>
    </div>
    <div th:if="${error}" class="error" th:text="${error}"></div>
</section>
</html>
