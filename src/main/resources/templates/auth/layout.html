<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" th:fragment="page(content)">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title th:text="${title} ?: 'KEYCE Auth'">KEYCE Auth</title>
    <style>
        :root {
            --ink: #132019;
            --muted: #647067;
            --line: #dce5df;
            --paper: #ffffff;
            --soft: #f3f7f4;
            --green: #1f8a5b;
            --blue: #2457d6;
            --red: #c2414b;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
            color: var(--ink);
            background:
                    linear-gradient(135deg, rgba(31,138,91,.12), transparent 38%),
                    linear-gradient(315deg, rgba(36,87,214,.10), transparent 42%),
                    #eef4f0;
            display: grid;
            place-items: center;
            padding: 24px;
        }
        .shell { width: min(1040px, 100%); }
        .top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 18px;
        }
        .brand { display: flex; align-items: center; gap: 12px; font-weight: 900; }
        .mark {
            width: 42px; height: 42px; border-radius: 8px;
            display: grid; place-items: center;
            background: #173b2a; color: #ffffff; font-weight: 900;
        }
        .pill {
            color: var(--muted);
            border: 1px solid var(--line);
            background: rgba(255,255,255,.72);
            padding: 8px 12px;
            border-radius: 999px;
            font-size: 13px;
        }
        .panel {
            display: grid;
            grid-template-columns: .95fr 1.05fr;
            min-height: 560px;
            background: rgba(255,255,255,.78);
            border: 1px solid rgba(255,255,255,.72);
            border-radius: 8px;
            box-shadow: 0 24px 70px rgba(19,32,25,.14);
            overflow: hidden;
        }
        .story {
            padding: 38px;
            background:
                    linear-gradient(rgba(19,32,25,.56), rgba(19,32,25,.70)),
                    url("https://images.unsplash.com/photo-1523240795612-9a054b0db644?auto=format&fit=crop&w=1200&q=80");
            background-size: cover;
            background-position: center;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }
        .story h1 { margin: 0 0 10px; font-size: clamp(30px, 5vw, 52px); line-height: 1.02; }
        .story p { margin: 0; color: rgba(255,255,255,.84); line-height: 1.6; max-width: 480px; }
        .content { padding: 38px; background: var(--paper); }
        .form-title { margin: 0 0 18px; font-size: 24px; }
        label { display: block; margin: 14px 0 7px; color: var(--muted); font-size: 14px; font-weight: 700; }
        input {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 13px 14px;
            color: var(--ink);
            background: #fbfdfb;
            outline: none;
        }
        input:focus { border-color: var(--green); box-shadow: 0 0 0 4px rgba(31,138,91,.12); }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn {
            width: 100%;
            margin-top: 18px;
            border: 0;
            border-radius: 8px;
            padding: 13px 16px;
            background: var(--green);
            color: white;
            font-weight: 900;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            justify-content: center;
        }
        .btn:hover { filter: brightness(.96); }
        .links { display: flex; justify-content: space-between; gap: 12px; margin-top: 14px; font-size: 14px; }
        .links a { color: var(--blue); text-decoration: none; font-weight: 800; }
        .links a:hover { text-decoration: underline; }
        .error, .success {
            margin: 12px 0;
            padding: 11px 12px;
            border-radius: 8px;
            font-weight: 700;
        }
        .error { color: var(--red); background: #fff1f2; border: 1px solid #fecdd3; }
        .success { color: #146c45; background: #edfdf4; border: 1px solid #bbf7d0; }
        .hint { color: var(--muted); line-height: 1.55; margin: 0 0 16px; }
        .field-error { color: var(--red); font-size: 13px; margin-top: 6px; }
        @media (max-width: 860px) {
            body { padding: 14px; }
            .panel { grid-template-columns: 1fr; }
            .story { min-height: 250px; padding: 24px; }
            .content { padding: 24px; }
            .row { grid-template-columns: 1fr; }
            .top { align-items: flex-start; flex-direction: column; }
        }
    </style>
</head>
<body>
<main class="shell">
    <div class="top">
        <div class="brand">
            <div class="mark">K</div>
            <div>KEYCE Auth</div>
        </div>
        <div class="pill">Spring Boot + Thymeleaf + CSRF + Logs</div>
    </div>
    <section class="panel">
        <aside class="story">
            <h1 th:text="${title} ?: 'Connexion securisee'">Connexion securisee</h1>
            <p>Creation de compte, connexion par role, espace admin, espace utilisateur, journalisation et reinitialisation par email.</p>
        </aside>
        <section class="content" th:insert="${content}"></section>
    </section>
</main>
</body>
</html>
