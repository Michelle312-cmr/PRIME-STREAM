server.port=8091
server.address=${SERVER_ADDRESS:0.0.0.0}
spring.application.name=amazon-prime-2-0
app.public-base-url=${APP_PUBLIC_BASE_URL:http://localhost:8091}
app.jwt.secret=${APP_JWT_SECRET:PrimeStreamLocalSecretChangeMeForProduction2026}
app.jwt.expiration-minutes=${APP_JWT_EXPIRATION_MINUTES:120}
# DB
spring.datasource.url=${DB_URL:jdbc:mysql://127.0.0.1:3306/prime_stream?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&useUnicode=true&characterEncoding=utf8}
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.h2.console.enabled=false
spring.h2.console.path=/h2-console
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
# Uploads
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=700MB
# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.enabled=true
# Logging (fichier KEYCE)
logging.file.name=logs/keyce.log
logging.level.root=INFO
logging.level.com.example.authapp=DEBUG
# Security
spring.security.user.name=disabled
spring.security.user.password=disabled
